name: OpenCode Feature Missing

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  feature-missing:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Run feature missing audit
        uses: sun-praise/opencode-actions/feature-missing@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          zhipu-api-key: ${{ secrets.ZHIPU_API_KEY }}
          opencode-go-api-key: ${{ secrets.OPENCODE_GO_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          stepfun-api-key: ${{ secrets.STEPFUN_API_KEY }}
          # Optional: override reasoning effort and thinking mode defaults
          # reasoning-effort: max
          # enable-thinking: true
