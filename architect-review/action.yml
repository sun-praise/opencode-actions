name: OpenCode Architect Review
description: Architecture-level review of PR changes focusing on coupling, layering, and structural concerns.

inputs:
  install-url:
    description: Installer URL used to bootstrap OpenCode.
    required: false
    default: https://opencode.ai/install
  install-dir:
    description: Directory where the opencode binary should be installed.
    required: false
    default: ""
  xdg-cache-home:
    description: Dedicated XDG cache directory for OpenCode.
    required: false
    default: ""
  cache:
    description: Cache the install and XDG cache directories with actions/cache.
    required: false
    default: "true"
  cache-key:
    description: Cache key suffix used to invalidate installer-based caches.
    required: false
    default: v1
  install-attempts:
    description: Number of installer retry attempts.
    required: false
    default: "3"
  allow-preinstalled:
    description: Reuse an existing opencode found on PATH instead of forcing installer bootstrap.
    required: false
    default: "false"
  version:
    description: Minimum required OpenCode version (semver). If the cached binary is older, it will be reinstalled. Defaults to the version in setup-opencode/default-version. Use "none" to disable version checking.
    required: false
    default: ""
  working-directory:
    description: Optional working directory before running opencode.
    required: false
    default: ""
  attempts:
    description: Total number of attempts before failing.
    required: false
    default: "3"
  retry-profile:
    description: Built-in retry profile, defaults to github-network for common GitHub usage.
    required: false
    default: github-network
  retry-on-regex:
    description: Retry only when stderr or stdout matches this regex.
    required: false
    default: ""
  retry-delay-seconds:
    description: Base delay between retries in seconds.
    required: false
    default: "15"
  timeout-seconds:
    description: Maximum execution time in seconds for `opencode github run`. Set 0 to disable.
    required: false
    default: "600"
  model:
    description: Value exported as MODEL before running `opencode github run`.
    required: false
    default: ""
  fallback-models:
    description: Optional comma- or newline-delimited fallback models tried after timeout or timeout-like failures.
    required: false
    default: ""
  model-timeout-seconds:
    description: Per-model timeout used before rotating to the next fallback model when fallback-models is configured. Set 0 to disable.
    required: false
    default: "300"
  fallback-on-regex:
    description: Rotate to the next fallback model when output matches this regex.
    required: false
    default: timed out|timeout|deadline exceeded|context deadline exceeded|operation timed out|connection timed out|ProviderModelNotFoundError
  prompt:
    description: Value exported as PROMPT before running `opencode github run`. When empty, the built-in architect review prompt is used.
    required: false
    default: ""
  architecture-context:
    description: >-
      Comma-separated file paths containing project architecture documentation
      (e.g. "AGENTS.md,docs/architecture.md"). File contents are appended to the
      prompt so the reviewer understands project structure. Files that do not
      exist are silently skipped. When empty, the default prompt reads AGENTS.md
      or CLAUDE.md automatically.
    required: false
    default: ""
  use-github-token:
    description: Value exported as USE_GITHUB_TOKEN before running `opencode github run`.
    required: false
    default: "true"
  github-token:
    description: Value exported as GITHUB_TOKEN before running `opencode github run`.
    required: false
    default: ""
  zhipu-api-key:
    description: Value exported as ZHIPU_API_KEY before running `opencode github run`.
    required: false
    default: ""
  opencode-go-api-key:
    description: Value exported as OPENCODE_API_KEY before running `opencode github run`. The opencode-go provider shares this env var with OpenCode Zen.
    required: false
    default: ""
  deepseek-api-key:
    description: Value exported as DEEPSEEK_API_KEY before running `opencode github run`.
    required: false
    default: ""
  minimax-api-key:
    description: Value exported as MINIMAX_API_KEY before running `opencode github run`.
    required: false
    default: ""
  xiaomi-api-key:
    description: Value exported as XIAOMI_API_KEY before running `opencode github run`.
    required: false
    default: ""
  reasoning-effort:
    description: Reasoning effort level for the model agent. Allowed values are low, medium, high, max.
    required: false
    default: "high"
  enable-thinking:
    description: Enable thinking mode for the model agent. When true, generates opencode.json with thinking.type=enabled.
    required: false
    default: "true"
  extra-env:
    description: >-
      Extra environment variables to pass to opencode runtime.
      Multi-line KEY=VALUE pairs, one per line. Empty lines and lines
      starting with '#' are ignored.
    required: false
    default: ""
  extra-env-allow-sensitive:
    description: >-
      When false (default), extra-env entries that override sensitive runtime
      variables (API keys, MODEL, PROMPT, etc.) are blocked with an error.
      Set to true to allow such overrides (with a warning).
    required: false
    default: "false"
  cleanup-error-comments:
    description: >-
      When true, automatically delete error comments posted by opencode to the PR
      after a failed run. Error comments are identified by matching the GITHUB_RUN_ID
      in the "[github run]" link combined with error indicators (fatal:, remote:, 403, etc.).
    required: false
    default: "true"
  language:
    description: >-
      Response language for the agent. `zh` (default) for Chinese, `en` for English.
    required: false
    default: "zh"

runs:
  using: composite
  steps:
    - if: ${{ runner.os != 'Linux' }}
      shell: bash
      run: |
        set -euo pipefail
        printf 'architect-review currently supports Linux runners only\n' >&2
        exit 1

    - id: version
      shell: bash
      run: |
        set -euo pipefail
        effective="${{ inputs.version }}"
        if [[ "$effective" == "none" ]]; then
          effective=""
        elif [[ -z "$effective" ]]; then
          default_file="${{ github.action_path }}/../setup-opencode/default-version"
          if [[ ! -f "$default_file" ]]; then
            printf 'error: default-version file not found at %s\n' "$default_file" >&2
            exit 1
          fi
          effective="$(tr -d '[:space:]' < "$default_file")"
          if [[ ! "$effective" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'error: invalid version in %s: %s\n' "$default_file" "$(cat "$default_file")" >&2
            exit 1
          fi
        fi
        printf 'version=%s\n' "$effective" >>"$GITHUB_OUTPUT"

    - id: paths
      shell: bash
      env:
        INPUT_INSTALL_DIR: ${{ inputs.install-dir }}
        INPUT_XDG_CACHE_HOME: ${{ inputs.xdg-cache-home }}
      run: |
        set -euo pipefail
        install_dir="$INPUT_INSTALL_DIR"
        xdg_cache_home="$INPUT_XDG_CACHE_HOME"

        if [[ -z "$install_dir" ]]; then
          install_dir="${RUNNER_TOOL_CACHE:-$HOME/.cache}/opencode/bin"
        fi

        if [[ -z "$xdg_cache_home" ]]; then
          xdg_cache_home="${RUNNER_TOOL_CACHE:-$HOME/.cache}/opencode/cache"
        fi

        printf 'install_dir=%s\n' "$install_dir" >>"$GITHUB_OUTPUT"
        printf 'xdg_cache_home=%s\n' "$xdg_cache_home" >>"$GITHUB_OUTPUT"

    - id: key
      shell: bash
      env:
        INPUT_INSTALL_URL: ${{ inputs.install-url }}
      run: |
        set -euo pipefail
        install_url_hash="$(printf '%s' "$INPUT_INSTALL_URL" | sha256sum | cut -d' ' -f1)"
        printf 'install_url_hash=%s\n' "$install_url_hash" >>"$GITHUB_OUTPUT"

    - id: cache
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.paths.outputs.install_dir }}
          ${{ steps.paths.outputs.xdg_cache_home }}
        key: architect-review-opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.key.outputs.install_url_hash }}-${{ steps.version.outputs.version }}-${{ inputs.cache-key }}

    - shell: bash
      env:
        OPENCODE_INSTALL_DIR: ${{ steps.paths.outputs.install_dir }}
        XDG_CACHE_HOME: ${{ steps.paths.outputs.xdg_cache_home }}
        OPENCODE_INSTALL_URL: ${{ inputs.install-url }}
        OPENCODE_INSTALL_ATTEMPTS: ${{ inputs.install-attempts }}
        OPENCODE_ALLOW_PREINSTALLED: ${{ inputs.allow-preinstalled }}
        OPENCODE_MIN_VERSION: ${{ steps.version.outputs.version }}
      run: ${{ github.action_path }}/../setup-opencode/install-opencode.sh

    - id: build-prompt
      shell: bash
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_ARCHITECTURE_CONTEXT: ${{ inputs.architecture-context }}
      run: |
        set -euo pipefail

        if [[ -n "$INPUT_PROMPT" ]]; then
          prompt="$INPUT_PROMPT"
        else
          prompt=$(cat <<'PROMPT_EOF'
        Review this pull request from an architecture perspective (read-only mode, DO NOT modify any code).

        First, read AGENTS.md (or CLAUDE.md) if it exists in the repository root to understand the project's architecture conventions and constraints.

        If neither AGENTS.md nor CLAUDE.md exists, infer architecture conventions by examining the project's directory tree (e.g., via `ls -la`, `find . -maxdepth 3 -type d -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/vendor/*'`) and key configuration files (e.g., `package.json`, `Cargo.toml`, `pyproject.toml`, `go.mod`). Use the inferred structure to reason about layering, module responsibilities, and naming conventions.

        Then analyze the PR changes for the following architecture concerns:

        1. **Coupling**: Does this change introduce unnecessary coupling between modules or layers? Are there hidden dependencies or circular imports that did not exist before?

        2. **Module placement**: Are new files, packages, or modules placed in the correct location according to the project's directory conventions? Does the naming align with neighboring modules?

        3. **Layering / responsibility boundaries**: Does this change respect existing separation of concerns? For example, does it mix business logic with presentation, or put infrastructure code in domain modules?

        4. **Interface design**: Are new APIs, classes, or functions designed with appropriate abstraction levels? Are they too broad, too narrow, or leaking implementation details?

        5. **Shotgun surgery**: Would adding a similar feature in the future require touching many files across different layers? Is the change scattered across N files when it should be localized?

        6. **Consistency**: Is the architectural pattern used here consistent with how similar concerns are handled elsewhere in the codebase?

        Do NOT report:
        - Code style, naming, or formatting issues (that's the review action's job)
        - Bugs or logic errors (that's the review action's job)
        - Test coverage suggestions
        - Minor refactoring suggestions unrelated to architecture

        DO NOT modify any code, only provide architecture review comments.
        The first line of your response must be exactly one of:
        - 架构合理 / SOUND
        - 架构有疑虑 / CONCERNS
        - 架构有问题 / PROBLEMATIC

        Decision rules:
        - Use "架构合理" / "SOUND" when the change follows existing architecture patterns and introduces no structural concerns.
        - Use "架构有疑虑" / "CONCERNS" when there are non-blocking architecture concerns that should be discussed but do not prevent merge.
        - Use "架构有问题" / "PROBLEMATIC" when the change introduces serious architectural violations that should block merge (e.g., breaking layering, introducing circular dependencies, creating a pattern that would be costly to reverse).

        Analyze the latest PR HEAD only.
        Do not repeat issues from earlier revisions unless they are still reproducible in the current files.
        Verify any blocking claim against the current code before listing it.

        Output format:
        - First line: the decision only
        - Then a short summary of the architectural analysis
        - Then "阻塞项" / "Blocking Issues" listing architecture issues that should block merge; if none, write "阻塞项：无" / "Blocking Issues: None"
        - Then "建议项" / "Suggestions" listing non-blocking architecture improvements; if none, write "建议项：无" / "Suggestions: None"
        PROMPT_EOF
        )
        fi

        if [[ -n "$INPUT_ARCHITECTURE_CONTEXT" ]]; then
          prompt="$prompt"$'\n\n'"---"$'\n'"Project architecture context (read the following files before reviewing):"$'\n'
          IFS=',' read -ra files <<< "$INPUT_ARCHITECTURE_CONTEXT"
          for f in "${files[@]}"; do
            f="${f#/}"
            f="${f#./}"
            if [[ -f "$f" ]]; then
              prompt="$prompt"$'\n'"--- File: $f ---"$'\n'"$(cat "$f")"$'\n'
            else
              printf 'warning: architecture-context file not found, skipping: %s\n' "$f" >&2
            fi
          done
        fi

        {
          printf 'prompt<<OPENCODE_PROMPT_EOF\n'
          printf '%s' "$prompt"
          printf '\nOPENCODE_PROMPT_EOF\n'
        } >>"$GITHUB_OUTPUT"

    - shell: bash
      env:
        GITHUB_RUN_OPENCODE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        GITHUB_RUN_OPENCODE_ATTEMPTS: ${{ inputs.attempts }}
        GITHUB_RUN_OPENCODE_RETRY_PROFILE: ${{ inputs.retry-profile }}
        GITHUB_RUN_OPENCODE_RETRY_ON_REGEX: ${{ inputs.retry-on-regex }}
        GITHUB_RUN_OPENCODE_RETRY_DELAY_SECONDS: ${{ inputs.retry-delay-seconds }}
        GITHUB_RUN_OPENCODE_TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        GITHUB_RUN_OPENCODE_MODEL: ${{ inputs.model }}
        GITHUB_RUN_OPENCODE_FALLBACK_MODELS: ${{ inputs.fallback-models }}
        GITHUB_RUN_OPENCODE_MODEL_TIMEOUT_SECONDS: ${{ inputs.model-timeout-seconds }}
        GITHUB_RUN_OPENCODE_FALLBACK_ON_REGEX: ${{ inputs.fallback-on-regex }}
        GITHUB_RUN_OPENCODE_PROMPT: ${{ steps.build-prompt.outputs.prompt }}
        GITHUB_RUN_OPENCODE_USE_GITHUB_TOKEN: ${{ inputs.use-github-token }}
        GITHUB_RUN_OPENCODE_GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_RUN_OPENCODE_ZHIPU_API_KEY: ${{ inputs.zhipu-api-key }}
        GITHUB_RUN_OPENCODE_OPENCODE_GO_API_KEY: ${{ inputs.opencode-go-api-key }}
        GITHUB_RUN_OPENCODE_DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GITHUB_RUN_OPENCODE_MINIMAX_API_KEY: ${{ inputs.minimax-api-key }}
        GITHUB_RUN_OPENCODE_XIAOMI_API_KEY: ${{ inputs.xiaomi-api-key }}
        GITHUB_RUN_OPENCODE_EXTRA_ENV: ${{ inputs.extra-env }}
        GITHUB_RUN_OPENCODE_EXTRA_ENV_ALLOW_SENSITIVE: ${{ inputs.extra-env-allow-sensitive }}
        GITHUB_RUN_OPENCODE_REASONING_EFFORT: ${{ inputs.reasoning-effort }}
        GITHUB_RUN_OPENCODE_ENABLE_THINKING: ${{ inputs.enable-thinking }}
        GITHUB_RUN_OPENCODE_PERMISSION: >-
          {"edit":"deny","bash":"deny"}
        GITHUB_RUN_OPENCODE_CLEANUP_ERROR_COMMENTS: ${{ inputs.cleanup-error-comments }}
        GITHUB_RUN_OPENCODE_LANGUAGE: ${{ inputs.language }}
      run: |
        if ! command -v python3 >/dev/null 2>&1; then
          printf 'python3 is required but not installed on this runner\n' >&2
          exit 1
        fi
        python3 ${{ github.action_path }}/../github-run-opencode/run-github-opencode.py
