name: OpenCode Spec Coverage
description: Cross-references project spec/task files against a PR's implementation to find planned but unimplemented features.

inputs:
  install-url:
    description: Installer URL used to bootstrap OpenCode.
    required: false
    default: https://opencode.ai/install
  install-dir:
    description: Directory where the opencode binary should be installed.
    required: false
    default: ""
  xdg-cache-home:
    description: Dedicated XDG cache directory for OpenCode.
    required: false
    default: ""
  cache:
    description: Cache the install and XDG cache directories with actions/cache.
    required: false
    default: "true"
  cache-key:
    description: Cache key suffix used to invalidate installer-based caches.
    required: false
    default: v1
  install-attempts:
    description: Number of installer retry attempts.
    required: false
    default: "3"
  allow-preinstalled:
    description: Reuse an existing opencode found on PATH instead of forcing installer bootstrap.
    required: false
    default: "false"
  version:
    description: Minimum required OpenCode version (semver). If the cached binary is older, it will be reinstalled. Defaults to the version in setup-opencode/default-version. Use "none" to disable version checking.
    required: false
    default: ""
  working-directory:
    description: Optional working directory before running opencode.
    required: false
    default: ""
  attempts:
    description: Total number of attempts before failing.
    required: false
    default: "3"
  retry-profile:
    description: Built-in retry profile, defaults to github-network for common GitHub usage.
    required: false
    default: github-network
  retry-on-regex:
    description: Retry only when stderr or stdout matches this regex.
    required: false
    default: ""
  retry-delay-seconds:
    description: Base delay between retries in seconds.
    required: false
    default: "15"
  timeout-seconds:
    description: Maximum execution time in seconds for `opencode github run`. Set 0 to disable.
    required: false
    default: "600"
  model:
    description: Value exported as MODEL before running `opencode github run`.
    required: false
    default: ""
  prompt:
    description: Value exported as PROMPT before running `opencode github run`.
    required: false
    default: |
      Spec coverage audit (read-only mode, DO NOT modify any code, DO NOT commit or push any changes).

      Your job is to check whether the PR implements everything its associated spec/task breakdown planned.

      Steps:
      1. Read the PR context (title, body, labels, linked issues) — this is provided by the opencode github run environment.
      2. **Determine whether this PR needs a spec.** Judge based on the PR's nature: does it introduce new functionality, new architecture, or significant behavioral changes that should be planned via a spec? Bug fixes, docs, tests, config changes, and minor refactorings typically do NOT need a spec. Use semantic understanding — do not rely on keyword matching alone.
      3. If the PR does NOT need a spec, output "无需审计" on the first line with a one-line explanation, then stop.
      4. If the PR DOES need a spec, discover spec/task files. Check these locations in the repository:
         - `openspec/changes/*/tasks.md` — OpenSpec task breakdowns
         - `openspec/changes/*/design.md` — OpenSpec design docs
         - `openspec/changes/*/spec.md` — OpenSpec spec files
         - `specs/**` or `docs/specs/**` — general spec directories
         - Any `tasks.md`, `TODO.md`, or `IMPLEMENTATION.md` in the repo root or `docs/`
         Try to read files at these paths. If the PR references an issue number, check for matching directory names under `openspec/changes/`.
      5. If the PR needs a spec but NO spec/task files are found, output "发现遗漏" on the first line and report this as a CRITICAL gap: this is a feature PR that should have spec-driven planning but lacks it.
      6. Read ALL relevant spec/task files completely. The spec is the **authoritative source of intended scope**.
      7. Read the PR's changed files to understand what was actually implemented.
      8. **Cross-reference every planned task against the PR diff:**
         - For each task item in the spec (especially unchecked items like `- [ ]`), verify the PR diff actually implements it.
         - A task is NOT complete just because related files exist in the repo. Verify the integration is wired end-to-end.
         - Pay special attention to "integration" or "wire up" tasks — these are easy to miss because they require modifying EXISTING code, not just adding new files.
      9. **Check end-to-end integration:**
         - Are new data models/tables actually read by runtime code paths (not just admin CRUD)?
         - Are new configurations actually consumed by the services that need them?
         - Are new APIs actually called from the appropriate integration points?
         - Are planned migration paths implemented (e.g., "migrate from old X to new Y")?

      Do NOT report:
      - Code quality, style, or security issues (that's the review action's job)
      - PR scope completeness vs its own title (that's the feature-missing action's job)
      - Bugs or logic errors in existing code
      - Test coverage suggestions

      Analyze the latest PR HEAD only.
      Verify any gap claim against the current code before listing it.

      DO NOT modify any code. DO NOT run git commit, git push, or any other write operations. Only provide analysis.

      Verdict rule (MUST follow):
      - First line must be exactly one of:
        - "无需审计" / "SKIP" — this PR does not need a spec (bug fix, docs, minor change)
        - "全覆盖" / "FULL COVERAGE" — ALL spec tasks are implemented with end-to-end integration
        - "发现遗漏" / "GAPS FOUND" — spec tasks are missing, not integrated, or a spec is required but absent

      Output format:
      - First line: the verdict ("无需审计" / "全覆盖" / "发现遗漏" for Chinese; "SKIP" / "FULL COVERAGE" / "GAPS FOUND" for English)
      - If "无需审计" / "SKIP": one-line explanation of why, then stop
      - Otherwise: a short summary listing which spec files you found and how many tasks were checked
      - If verdict is "发现遗漏" / "GAPS FOUND", classify each gap:
        ### CRITICAL
        Spec tasks with zero implementation — planned but completely absent from the PR.
        ### MEDIUM
        Partial implementation — structure exists but not wired into runtime code paths.
        ### LOW
        Minor gaps — documentation, non-essential features, or nice-to-haves.
        For each gap: quote the spec task verbatim, describe what's missing in the implementation, and suggest which file(s) should be modified.
      - If verdict is "全覆盖" / "FULL COVERAGE", briefly confirm all spec tasks are covered — do NOT include any severity sections.
  use-github-token:
    description: Value exported as USE_GITHUB_TOKEN before running `opencode github run`.
    required: false
    default: "true"
  github-token:
    description: Value exported as GITHUB_TOKEN before running `opencode github run`.
    required: false
    default: ""
  zhipu-api-key:
    description: Value exported as ZHIPU_API_KEY before running `opencode github run`.
    required: false
    default: ""
  opencode-go-api-key:
    description: Value exported as OPENCODE_API_KEY before running `opencode github run`. The opencode-go provider shares this env var with OpenCode Zen.
    required: false
    default: ""
  deepseek-api-key:
    description: Value exported as DEEPSEEK_API_KEY before running `opencode github run`.
    required: false
    default: ""
  reasoning-effort:
    description: Reasoning effort level for the model agent. Allowed values are low, medium, high, max.
    required: false
    default: "max"
  enable-thinking:
    description: Enable thinking mode for the model agent. When true, generates opencode.json with thinking.type=enabled.
    required: false
    default: "true"
  extra-env:
    description: >-
      Extra environment variables to pass to opencode runtime.
      Multi-line KEY=VALUE pairs, one per line. Empty lines and lines
      starting with '#' are ignored. Note: these variables are set after
      internal configuration and may override sensitive runtime settings
      such as MODEL, GITHUB_TOKEN, or API keys.
    required: false
    default: ""
  fallback-models:
    description: Optional comma- or newline-delimited fallback models tried after timeout or timeout-like failures.
    required: false
    default: ""
  model-timeout-seconds:
    description: Per-model timeout used before rotating to the next fallback model when fallback-models is configured. Set 0 to disable.
    required: false
    default: "300"
  fallback-on-regex:
    description: Rotate to the next fallback model when output matches this regex.
    required: false
    default: timed out|timeout|deadline exceeded|context deadline exceeded|operation timed out|connection timed out
  language:
    description: >-
      Response language for the agent. `zh` (default) for Chinese, `en` for English.
    required: false
    default: "zh"

runs:
  using: composite
  steps:
    - if: ${{ runner.os != 'Linux' }}
      shell: bash
      run: |
        set -euo pipefail
        printf 'spec-coverage currently supports Linux runners only\n' >&2
        exit 1

    - id: paths
      shell: bash
      env:
        INPUT_INSTALL_DIR: ${{ inputs.install-dir }}
        INPUT_XDG_CACHE_HOME: ${{ inputs.xdg-cache-home }}
      run: |
        set -euo pipefail
        install_dir="$INPUT_INSTALL_DIR"
        xdg_cache_home="$INPUT_XDG_CACHE_HOME"

        if [[ -z "$install_dir" ]]; then
          install_dir="${RUNNER_TOOL_CACHE:-$HOME/.cache}/opencode/bin"
        fi

        if [[ -z "$xdg_cache_home" ]]; then
          xdg_cache_home="${RUNNER_TOOL_CACHE:-$HOME/.cache}/opencode/cache"
        fi

        printf 'install_dir=%s\n' "$install_dir" >>"$GITHUB_OUTPUT"
        printf 'xdg_cache_home=%s\n' "$xdg_cache_home" >>"$GITHUB_OUTPUT"

    - id: key
      shell: bash
      env:
        INPUT_INSTALL_URL: ${{ inputs.install-url }}
      run: |
        set -euo pipefail
        install_url_hash="$(printf '%s' "$INPUT_INSTALL_URL" | sha256sum | cut -d ' ' -f1)"
        printf 'install_url_hash=%s\n' "$install_url_hash" >>"$GITHUB_OUTPUT"

    - id: version
      shell: bash
      run: |
        set -euo pipefail
        effective="${{ inputs.version }}"
        if [[ "$effective" == "none" ]]; then
          effective=""
        elif [[ -z "$effective" ]]; then
          default_file="${{ github.action_path }}/../setup-opencode/default-version"
          if [[ ! -f "$default_file" ]]; then
            printf 'error: default-version file not found at %s\n' "$default_file" >&2
            exit 1
          fi
          effective="$(tr -d '[:space:]' < "$default_file")"
          if [[ ! "$effective" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'error: invalid version in %s: %s\n' "$default_file" "$(cat "$default_file")" >&2
            exit 1
          fi
        fi
        printf 'version=%s\n' "$effective" >>"$GITHUB_OUTPUT"

    - id: cache
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.paths.outputs.install_dir }}
          ${{ steps.paths.outputs.xdg_cache_home }}
        key: spec-coverage-opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.key.outputs.install_url_hash }}-${{ steps.version.outputs.version }}-${{ inputs.cache-key }}

    - shell: bash
      env:
        OPENCODE_INSTALL_DIR: ${{ steps.paths.outputs.install_dir }}
        XDG_CACHE_HOME: ${{ steps.paths.outputs.xdg_cache_home }}
        OPENCODE_INSTALL_URL: ${{ inputs.install-url }}
        OPENCODE_INSTALL_ATTEMPTS: ${{ inputs.install-attempts }}
        OPENCODE_ALLOW_PREINSTALLED: ${{ inputs.allow-preinstalled }}
        OPENCODE_MIN_VERSION: ${{ steps.version.outputs.version }}
      run: ${{ github.action_path }}/../setup-opencode/install-opencode.sh

    - shell: bash
      env:
        GITHUB_RUN_OPENCODE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        GITHUB_RUN_OPENCODE_ATTEMPTS: ${{ inputs.attempts }}
        GITHUB_RUN_OPENCODE_RETRY_PROFILE: ${{ inputs.retry-profile }}
        GITHUB_RUN_OPENCODE_RETRY_ON_REGEX: ${{ inputs.retry-on-regex }}
        GITHUB_RUN_OPENCODE_RETRY_DELAY_SECONDS: ${{ inputs.retry-delay-seconds }}
        GITHUB_RUN_OPENCODE_TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        GITHUB_RUN_OPENCODE_MODEL: ${{ inputs.model }}
        GITHUB_RUN_OPENCODE_PROMPT: ${{ inputs.prompt }}
        GITHUB_RUN_OPENCODE_USE_GITHUB_TOKEN: ${{ inputs.use-github-token }}
        GITHUB_RUN_OPENCODE_GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_RUN_OPENCODE_ZHIPU_API_KEY: ${{ inputs.zhipu-api-key }}
        GITHUB_RUN_OPENCODE_OPENCODE_GO_API_KEY: ${{ inputs.opencode-go-api-key }}
        GITHUB_RUN_OPENCODE_DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GITHUB_RUN_OPENCODE_REASONING_EFFORT: ${{ inputs.reasoning-effort }}
        GITHUB_RUN_OPENCODE_ENABLE_THINKING: ${{ inputs.enable-thinking }}
        GITHUB_RUN_OPENCODE_EXTRA_ENV: ${{ inputs.extra-env }}
        GITHUB_RUN_OPENCODE_FALLBACK_MODELS: ${{ inputs.fallback-models }}
        GITHUB_RUN_OPENCODE_MODEL_TIMEOUT_SECONDS: ${{ inputs.model-timeout-seconds }}
        GITHUB_RUN_OPENCODE_FALLBACK_ON_REGEX: ${{ inputs.fallback-on-regex }}
        GITHUB_RUN_OPENCODE_PERMISSION: >-
          {"edit":"deny","bash":{"git commit *":"deny","git push *":"deny","git add *":"deny","git stash *":"deny","git reset *":"deny","git checkout *":"deny"}}
        GITHUB_RUN_OPENCODE_LANGUAGE: ${{ inputs.language }}
      run: |
        if ! command -v python3 >/dev/null 2>&1; then
          printf 'python3 is required but not installed on this runner\n' >&2
          exit 1
        fi
        python3 ${{ github.action_path }}/../github-run-opencode/run-github-opencode.py
