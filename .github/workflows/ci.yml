name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-actions:
    runs-on: ubuntu-latest
    env:
      FAKE_OPENCODE_VERSION: 1.4.6
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start fake installer server
        run: |
          python3 -m http.server 8765 --bind 127.0.0.1 --directory tests/fixtures >/tmp/opencode-actions-http.log 2>&1 &
          echo $! > /tmp/opencode-actions-http.pid

      - name: Pre-install fake opencode to cache dir
        run: |
          mkdir -p ~/.opencode/bin
          cat > ~/.opencode/bin/opencode <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-}" == "--version" ]]; then
            printf '%s\n' "${FAKE_OPENCODE_VERSION:-0.0.0-test}"
            exit 0
          fi
          printf 'fake opencode %s\n' "$*"
          printf 'MODEL=%s\n' "${MODEL:-}"
          printf 'PROMPT=%s\n' "${PROMPT:-}"
          printf 'USE_GITHUB_TOKEN=%s\n' "${USE_GITHUB_TOKEN:-}"
          printf 'GITHUB_TOKEN=%s\n' "${GITHUB_TOKEN:-}"
          printf 'ZHIPU_API_KEY=%s\n' "${ZHIPU_API_KEY:-}"
          printf 'OPENCODE_API_KEY=%s\n' "${OPENCODE_API_KEY:-}"
          EOF
          chmod +x ~/.opencode/bin/opencode

      - name: Run GitHub convenience action
        uses: ./github-run-opencode
        with:
          install-url: http://127.0.0.1:8765/fake-installer.sh
          attempts: 1
          model: ci-wrapper
          prompt: smoke prompt
          github-token: smoke-gh-token
          zhipu-api-key: smoke-zhipu-token

      - name: Run review convenience action
        uses: ./review
        with:
          install-url: http://127.0.0.1:8765/fake-installer.sh
          attempts: 1
          github-token: smoke-gh-token
          zhipu-api-key: smoke-zhipu-token

      - name: Stop fake installer server
        if: always()
        run: |
          if [[ -f /tmp/opencode-actions-http.pid ]]; then
            kill "$(cat /tmp/opencode-actions-http.pid)" || true
          fi
