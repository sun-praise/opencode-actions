name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-actions:
    runs-on: ubuntu-latest
    env:
      FAKE_OPENCODE_VERSION: 2.0.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start fake installer server
        run: |
          python3 -m http.server 8765 --bind 127.0.0.1 --directory tests/fixtures >/tmp/opencode-actions-http.log 2>&1 &
          echo $! > /tmp/opencode-actions-http.pid

      - name: Setup OpenCode via local action
        uses: ./setup-opencode
        with:
          install-url: http://127.0.0.1:8765/fake-installer.sh
          cache: false
          install-attempts: 1

      - name: Run OpenCode via local action
        uses: ./run-opencode
        with:
          args: github run
          attempts: 1
        env:
          FAKE_OPENCODE_VERSION: ci-smoke

      - name: Run GitHub convenience action
        uses: ./github-run-opencode
        with:
          install-url: http://127.0.0.1:8765/fake-installer.sh
          cache: false
          install-attempts: 1
          attempts: 1
          model: ci-wrapper
          prompt: smoke prompt
          github-token: smoke-gh-token
          zhipu-api-key: smoke-zhipu-token
        env:
          FAKE_OPENCODE_VERSION: 2.0.1

      - name: Run review convenience action
        uses: ./review
        with:
          install-url: http://127.0.0.1:8765/fake-installer.sh
          cache: false
          install-attempts: 1
          attempts: 1
          github-token: smoke-gh-token
          zhipu-api-key: smoke-zhipu-token

      - name: Prepare fake kimi binary
        run: |
          cp tests/fixtures/fake-kimi.sh /usr/local/bin/kimi
          chmod +x /usr/local/bin/kimi

      - name: Setup Kimi CLI via local action
        uses: ./setup-kimi-cli
        with:
          cache: false
        env:
          FAKE_KIMI_VERSION: 1.0.0-smoke

      - name: Run Kimi CLI via local action
        uses: ./run-kimi-cli
        with:
          prompt: smoke kimi prompt
          model: smoke-kimi-model
          attempts: 1

      - name: Run review with Kimi CLI
        uses: ./review
        with:
          cli: kimi-cli
          cache: false
          attempts: 1
          prompt: kimi review prompt
          model: kimi-review-model

      - name: Stop fake installer server
        if: always()
        run: |
          if [[ -f /tmp/opencode-actions-http.pid ]]; then
            kill "$(cat /tmp/opencode-actions-http.pid)" || true
          fi
