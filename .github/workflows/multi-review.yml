name: Multi-Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  multi-review:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run multi-review
        uses: sun-praise/opencode-actions/multi-review@v3.7.0
        with:
          model: ${{ vars.MODEL_NAME }}
          default-team: "quality:1,security:1,performance:1,architecture:1,regression-test:1,test-value:1"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          zhipu-api-key: ${{ secrets.ZHIPU_API_KEY }}
          deepseek-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          opencode-go-api-key: ${{ secrets.OPENCODE_GO_API_KEY }}
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
