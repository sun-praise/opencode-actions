name: OpenCode PR Feature Missing Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: AI Code Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref || github.event.pull_request.head.sha }}

      - name: Run feature missing audit (xiaomi mimo test)
        uses: sun-praise/opencode-actions/feature-missing@491e985
        with:
          model: xiaomi-token-plan-cn/mimo-v2.5
          github-token: ${{ secrets.GITHUB_TOKEN }}
          zhipu-api-key: ${{ secrets.ZHIPU_API_KEY }}
          deepseek-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          opencode-go-api-key: ${{ secrets.OPENCODE_GO_API_KEY }}
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
          xiaomi-api-key: ${{ secrets.XIAOMI_API_KEY }}
