name: Review (xiaomi test)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref || github.event.pull_request.head.sha }}

      - name: Run review (xiaomi mimo test)
        uses: sun-praise/opencode-actions/review@v3.3.0
        with:
          model: xiaomi-token-plan-cn/mimo-v2.5-pro
          github-token: ${{ secrets.GITHUB_TOKEN }}
          xiaomi-api-key: ${{ secrets.XIAOMI_API_KEY }}
