name: OpenCode PR Feature Missing Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: AI Code Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref || github.event.pull_request.head.sha }}

      - name: Run feature missing audit
        uses: sun-praise/opencode-actions/feature-missing@v3.1.1
        with:
          model: minimax/MiniMax-M3
          github-token: ${{ secrets.GITHUB_TOKEN }}
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
