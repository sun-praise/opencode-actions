name: Test Multi-Review v3

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty for current PR)"
        required: false
        type: number

jobs:
  test-v3:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run multi-review v3
        uses: sun-praise/opencode-actions/multi-review@v3
        with:
          model: "litellm/deepseek-v4-flash"
          default-team: "quality:1,security:1"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          litellm-url: ${{ secrets.LITELLM_URL }}
          litellm-api-key: ${{ secrets.LITELLM_API_KEY }}
