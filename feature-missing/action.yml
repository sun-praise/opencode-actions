name: OpenCode Feature Missing
description: Compares PR implementation against the linked issue spec to find missing or incomplete features before merge.

inputs:
  install-url:
    description: Installer URL used to bootstrap OpenCode.
    required: false
    default: https://opencode.ai/install
  install-dir:
    description: Directory where the opencode binary should be installed.
    required: false
    default: ""
  xdg-cache-home:
    description: Dedicated XDG cache directory for OpenCode.
    required: false
    default: ""
  cache:
    description: Cache the install and XDG cache directories with actions/cache.
    required: false
    default: "true"
  cache-key:
    description: Cache key suffix used to invalidate installer-based caches.
    required: false
    default: v1
  install-attempts:
    description: Number of installer retry attempts.
    required: false
    default: "3"
  allow-preinstalled:
    description: Reuse an existing opencode found on PATH instead of forcing installer bootstrap.
    required: false
    default: "false"
  version:
    description: Minimum required OpenCode version (semver). If the cached binary is older, it will be reinstalled. Defaults to the version in setup-opencode/default-version. Use "none" to disable version checking.
    required: false
    default: ""
  working-directory:
    description: Optional working directory before running opencode.
    required: false
    default: ""
  attempts:
    description: Total number of attempts before failing.
    required: false
    default: "3"
  retry-profile:
    description: Built-in retry profile, defaults to github-network for common GitHub usage.
    required: false
    default: github-network
  retry-on-regex:
    description: Retry only when stderr or stdout matches this regex.
    required: false
    default: ""
  retry-delay-seconds:
    description: Base delay between retries in seconds.
    required: false
    default: "15"
  timeout-seconds:
    description: Maximum execution time in seconds for `opencode github run`. Set 0 to disable.
    required: false
    default: "600"
  model:
    description: Value exported as MODEL before running `opencode github run`.
    required: false
    default: ""
  prompt:
    description: Value exported as PROMPT before running `opencode github run`.
    required: false
    default: |
      Audit this pull request for missing feature implementation (read-only mode, DO NOT modify any code).

      Steps:
      1. Run `gh pr view --json closingIssuesReferences,title,body` to find linked issues (opencode github run already provides the PR context, just run the command without a PR number).
      2. If there are linked issues, read each issue body as the feature spec (use `gh issue view`).
      3. If no linked issues, extract the requirements from the PR title and body itself.
      4. Read the PR's changed files to understand what was actually implemented.
      5. Compare the spec/requirements against the implementation, and identify gaps.

      Focus on finding:
      - Features or behaviors mentioned in the spec but not implemented at all
      - Features only partially implemented (e.g., data structures created but never used, scheduler added but not integrated)
      - Edge cases or error handling described in the spec but missing from code
      - Integration gaps (e.g., a new component exists but is never called from the main flow)
      - Configuration options mentioned in the spec but not wired up

      Do NOT report:
      - Code style issues, naming, or formatting (that's the review action's job)
      - Bugs or logic errors in existing code
      - Suggestions for additional features beyond the spec
      - Test coverage gaps unless the spec explicitly requires specific tests

      Analyze the latest PR HEAD only.
      Do not repeat issues from earlier revisions unless they are still reproducible in the current files.
      Verify any gap claim against the current code before listing it.

      Please respond in Chinese. DO NOT modify any code, only provide analysis.

      Verdict rule (MUST follow):
      - After completing your analysis, set the first line to exactly one of:
        - "无遗漏" / "NO GAPS" if and only if ALL spec items are fully implemented (no gaps at all)
        - "发现遗漏" / "GAPS FOUND" if and only if at least one gap exists
      - The first line MUST match your actual finding. NEVER write "发现遗漏" / "GAPS FOUND" when no gaps exist.

      Output format:
      - First line: the verdict ("无遗漏" or "发现遗漏" for Chinese; "NO GAPS" or "GAPS FOUND" for English) — see verdict rule above
      - Then a short summary of your analysis
      - If verdict is "发现遗漏" / "GAPS FOUND", classify each gap by severity:
        ### CRITICAL
        Core functionality described in the spec is missing or completely non-functional.
        ### MEDIUM
        Partial implementation, integration gaps, or important edge cases not handled.
        ### LOW
        Minor gaps, nice-to-have features, or documentation discrepancies.
        For each gap: describe what's missing, reference the relevant spec section, and suggest where the implementation should be added.
      - If verdict is "无遗漏" / "NO GAPS", briefly confirm all spec items are covered — do NOT include any severity sections.
  use-github-token:
    description: Value exported as USE_GITHUB_TOKEN before running `opencode github run`.
    required: false
    default: "true"
  github-token:
    description: Value exported as GITHUB_TOKEN before running `opencode github run`.
    required: false
    default: ""
  zhipu-api-key:
    description: Value exported as ZHIPU_API_KEY before running `opencode github run`.
    required: false
    default: ""
  opencode-go-api-key:
    description: Value exported as OPENCODE_API_KEY before running `opencode github run`. The opencode-go provider shares this env var with OpenCode Zen.
    required: false
    default: ""
  deepseek-api-key:
    description: Value exported as DEEPSEEK_API_KEY before running `opencode github run`.
    required: false
    default: ""
  reasoning-effort:
    description: Reasoning effort level for the model agent. Allowed values are low, medium, high, max.
    required: false
    default: "max"
  enable-thinking:
    description: Enable thinking mode for the model agent. When true, generates opencode.json with thinking.type=enabled.
    required: false
    default: "true"
  fallback-models:
    description: Optional comma- or newline-delimited fallback models tried after timeout or timeout-like failures.
    required: false
    default: ""
  model-timeout-seconds:
    description: Per-model timeout used before rotating to the next fallback model when fallback-models are configured. Set 0 to disable.
    required: false
    default: "300"
  fallback-on-regex:
    description: Rotate to the next fallback model when output matches this regex.
    required: false
    default: timed out|timeout|deadline exceeded|context deadline exceeded|operation timed out|connection timed out
  language:
    description: >-
      Response language for the agent. `zh` (default) for Chinese, `en` for English.
    required: false
    default: "zh"

runs:
  using: composite
  steps:
    - if: ${{ runner.os != 'Linux' }}
      shell: bash
      run: |
        set -euo pipefail
        printf 'feature-missing currently supports Linux runners only\n' >&2
        exit 1

    - id: paths
      shell: bash
      env:
        INPUT_INSTALL_DIR: ${{ inputs.install-dir }}
        INPUT_XDG_CACHE_HOME: ${{ inputs.xdg-cache-home }}
      run: |
        set -euo pipefail
        install_dir="$INPUT_INSTALL_DIR"
        xdg_cache_home="$INPUT_XDG_CACHE_HOME"

        if [[ -z "$install_dir" ]]; then
          install_dir="${RUNNER_TOOL_CACHE:-$HOME/.cache}/opencode/bin"
        fi

        if [[ -z "$xdg_cache_home" ]]; then
          xdg_cache_home="${RUNNER_TOOL_CACHE:-$HOME/.cache}/opencode/cache"
        fi

        printf 'install_dir=%s\n' "$install_dir" >>"$GITHUB_OUTPUT"
        printf 'xdg_cache_home=%s\n' "$xdg_cache_home" >>"$GITHUB_OUTPUT"

    - id: key
      shell: bash
      env:
        INPUT_INSTALL_URL: ${{ inputs.install-url }}
      run: |
        set -euo pipefail
        install_url_hash="$(printf '%s' "$INPUT_INSTALL_URL" | sha256sum | cut -d' ' -f1)"
        printf 'install_url_hash=%s\n' "$install_url_hash" >>"$GITHUB_OUTPUT"

    - id: version
      shell: bash
      run: |
        set -euo pipefail
        effective="${{ inputs.version }}"
        if [[ "$effective" == "none" ]]; then
          effective=""
        elif [[ -z "$effective" ]]; then
          default_file="${{ github.action_path }}/../setup-opencode/default-version"
          if [[ ! -f "$default_file" ]]; then
            printf 'error: default-version file not found at %s\n' "$default_file" >&2
            exit 1
          fi
          effective="$(tr -d '[:space:]' < "$default_file")"
          if [[ ! "$effective" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'error: invalid version in %s: %s\n' "$default_file" "$(cat "$default_file")" >&2
            exit 1
          fi
        fi
        printf 'version=%s\n' "$effective" >>"$GITHUB_OUTPUT"

    - id: cache
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.paths.outputs.install_dir }}
          ${{ steps.paths.outputs.xdg_cache_home }}
        key: feature-missing-opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.key.outputs.install_url_hash }}-${{ steps.version.outputs.version }}-${{ inputs.cache-key }}

    - shell: bash
      env:
        OPENCODE_INSTALL_DIR: ${{ steps.paths.outputs.install_dir }}
        XDG_CACHE_HOME: ${{ steps.paths.outputs.xdg_cache_home }}
        OPENCODE_INSTALL_URL: ${{ inputs.install-url }}
        OPENCODE_INSTALL_ATTEMPTS: ${{ inputs.install-attempts }}
        OPENCODE_ALLOW_PREINSTALLED: ${{ inputs.allow-preinstalled }}
        OPENCODE_MIN_VERSION: ${{ steps.version.outputs.version }}
      run: ${{ github.action_path }}/../setup-opencode/install-opencode.sh

    - shell: bash
      env:
        GITHUB_RUN_OPENCODE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        GITHUB_RUN_OPENCODE_ATTEMPTS: ${{ inputs.attempts }}
        GITHUB_RUN_OPENCODE_RETRY_PROFILE: ${{ inputs.retry-profile }}
        GITHUB_RUN_OPENCODE_RETRY_ON_REGEX: ${{ inputs.retry-on-regex }}
        GITHUB_RUN_OPENCODE_RETRY_DELAY_SECONDS: ${{ inputs.retry-delay-seconds }}
        GITHUB_RUN_OPENCODE_TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        GITHUB_RUN_OPENCODE_MODEL: ${{ inputs.model }}
        GITHUB_RUN_OPENCODE_PROMPT: ${{ inputs.prompt }}
        GITHUB_RUN_OPENCODE_USE_GITHUB_TOKEN: ${{ inputs.use-github-token }}
        GITHUB_RUN_OPENCODE_GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_RUN_OPENCODE_ZHIPU_API_KEY: ${{ inputs.zhipu-api-key }}
        GITHUB_RUN_OPENCODE_OPENCODE_GO_API_KEY: ${{ inputs.opencode-go-api-key }}
        GITHUB_RUN_OPENCODE_DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GITHUB_RUN_OPENCODE_REASONING_EFFORT: ${{ inputs.reasoning-effort }}
        GITHUB_RUN_OPENCODE_ENABLE_THINKING: ${{ inputs.enable-thinking }}
        GITHUB_RUN_OPENCODE_FALLBACK_MODELS: ${{ inputs.fallback-models }}
        GITHUB_RUN_OPENCODE_MODEL_TIMEOUT_SECONDS: ${{ inputs.model-timeout-seconds }}
        GITHUB_RUN_OPENCODE_FALLBACK_ON_REGEX: ${{ inputs.fallback-on-regex }}
        GITHUB_RUN_OPENCODE_PERMISSION: >-
          {"edit":"deny","bash":{"git commit *":"deny","git push *":"deny","git add *":"deny","git stash *":"deny","git reset *":"deny","git checkout *":"deny"}}
        GITHUB_RUN_OPENCODE_LANGUAGE: ${{ inputs.language }}
      run: |
        if ! command -v python3 >\/dev/null 2>&1; then
          printf 'python3 is required but not installed on this runner\n' >&2
          exit 1
        fi
        python3 ${{ github.action_path }}/../github-run-opencode/run-github-opencode.py
